<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171033"/>
      <stop offset="1" stop-color="#0b0a1e"/>
    </linearGradient>
    <radialGradient id="g3" cx="0.62" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#47bfff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#47bfff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7e14ff"/>
      <stop offset="0.6" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#7ff0ff"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#dffaff"/>
      <stop offset="1" stop-color="#47bfff"/>
    </radialGradient>
    <filter id="soft3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>
  <rect width="512" height="512" rx="112" fill="url(#g3)"/>

  <!-- faint grid -->
  <g stroke="#3a2f6e" stroke-width="2" opacity="0.4">
    <line x1="96" y1="416" x2="416" y2="416"/>
    <line x1="96" y1="96" x2="96" y2="416"/>
  </g>

  <!-- rising trend line -->
  <polyline points="116,372 196,300 268,336 392,150"
            fill="none" stroke="url(#line)" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#soft3)" opacity="0.6"/>
  <polyline points="116,372 196,300 268,336 392,150"
            fill="none" stroke="url(#line)" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow head -->
  <g fill="#7ff0ff">
    <path d="M392 150 l-58 6 l34 34 z"/>
    <path d="M392 150 l-6 58 l-28 -28 z"/>
  </g>

  <!-- data nodes -->
  <g>
    <circle cx="116" cy="372" r="15" fill="url(#dot)"/>
    <circle cx="196" cy="300" r="15" fill="url(#dot)"/>
    <circle cx="268" cy="336" r="15" fill="url(#dot)"/>
  </g>

  <!-- AI spark cluster top-left -->
  <g transform="translate(170,150)" fill="#9b5cff">
    <path d="M0 -34 C4 -10 10 -4 34 0 C10 4 4 10 0 34 C-4 10 -10 4 -34 0 C-10 -4 -4 -10 0 -34 Z"/>
  </g>
  <g transform="translate(232,108)" fill="#7ff0ff">
    <path d="M0 -16 C2 -5 5 -2 16 0 C5 2 2 5 0 16 C-2 5 -5 2 -16 0 C-5 -2 -2 -5 0 -16 Z"/>
  </g>
</svg>
