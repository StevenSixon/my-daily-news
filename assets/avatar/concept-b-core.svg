<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1430"/>
      <stop offset="0.5" stop-color="#1a1448"/>
      <stop offset="1" stop-color="#0a0a1f"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#47bfff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#47bfff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#47bfff"/>
      <stop offset="1" stop-color="#7e14ff"/>
    </linearGradient>
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#bff4ff"/>
      <stop offset="1" stop-color="#47bfff"/>
    </radialGradient>
    <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg2)"/>
  <rect width="512" height="512" rx="112" fill="url(#coreGlow)"/>

  <!-- hexagon network -->
  <g transform="translate(256,256)">
    <!-- connecting edges -->
    <g stroke="url(#edge)" stroke-width="7" opacity="0.85" stroke-linecap="round">
      <line x1="0" y1="-132" x2="114" y2="-66"/>
      <line x1="114" y1="-66" x2="114" y2="66"/>
      <line x1="114" y1="66" x2="0" y2="132"/>
      <line x1="0" y1="132" x2="-114" y2="66"/>
      <line x1="-114" y1="66" x2="-114" y2="-66"/>
      <line x1="-114" y1="-66" x2="0" y2="-132"/>
    </g>
    <!-- spokes to core -->
    <g stroke="#6da8ff" stroke-width="5" opacity="0.55">
      <line x1="0" y1="0" x2="0" y2="-132"/>
      <line x1="0" y1="0" x2="114" y2="-66"/>
      <line x1="0" y1="0" x2="114" y2="66"/>
      <line x1="0" y1="0" x2="0" y2="132"/>
      <line x1="0" y1="0" x2="-114" y2="66"/>
      <line x1="0" y1="0" x2="-114" y2="-66"/>
    </g>

    <!-- vertex nodes -->
    <g>
      <circle cx="0" cy="-132" r="20" fill="url(#node)"/>
      <circle cx="114" cy="-66" r="20" fill="url(#node)"/>
      <circle cx="114" cy="66" r="20" fill="url(#node)"/>
      <circle cx="0" cy="132" r="20" fill="url(#node)"/>
      <circle cx="-114" cy="66" r="20" fill="url(#node)"/>
      <circle cx="-114" cy="-66" r="20" fill="url(#node)"/>
    </g>

    <!-- glowing core -->
    <circle cx="0" cy="0" r="58" fill="#7e14ff" filter="url(#soft2)"/>
    <circle cx="0" cy="0" r="46" fill="url(#edge)"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#bff4ff" stroke-width="3" opacity="0.7"/>
    <text x="0" y="17" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">AI</text>
  </g>
</svg>
