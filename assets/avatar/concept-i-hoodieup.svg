<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1430"/><stop offset="0.5" stop-color="#191f44"/><stop offset="1" stop-color="#080a1c"/>
    </linearGradient>
    <radialGradient id="gi" cx="0.5" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#47bfff" stop-opacity="0.4"/><stop offset="1" stop-color="#47bfff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f6e"/><stop offset="1" stop-color="#241b4a"/>
    </linearGradient>
    <radialGradient id="glassglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9bf6ff"/><stop offset="1" stop-color="#36b4ff"/>
    </radialGradient>
    <filter id="softi" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgi)"/>
  <rect width="512" height="512" rx="112" fill="url(#gi)"/>
  <g fill="#47bfff" opacity="0.16" font-family="monospace" font-size="44" font-weight="700">
    <text x="40" y="94">&gt;_</text><text x="402" y="476">{ }</text>
  </g>
  <!-- hoodie outer -->
  <path d="M256 96
           C150 96 120 190 120 286
           C120 360 150 430 150 512
           H362
