  <ellipse cx="256" cy="262" rx="74" ry="86" fill="#3a4a63" opacity="0.55"/>
  <!-- glowing glasses -->
  <g filter="url(#softi)">
    <rect x="196" y="240" width="50" height="34" rx="15" fill="#47bfff"/>
    <rect x="266" y="240" width="50" height="34" rx="15" fill="#47bfff"/>
  </g>
  <rect x="196" y="240" width="50" height="34" rx="15" fill="url(#glassglow)"/>
  <rect x="266" y="240" width="50" height="34" rx="15" fill="url(#glassglow)"/>
  <line x1="246" y1="257" x2="266" y2="257" stroke="#9bf6ff" stroke-width="6" stroke-linecap="round"/>
  <g stroke="#0c1024" stroke-width="4" opacity="0.7" stroke-linecap="round">
    <line x1="206" y1="252" x2="226" y2="252"/><line x1="206" y1="263" x2="220" y2="263"/>
    <line x1="276" y1="252" x2="296" y2="252"/><line x1="276" y1="263" x2="290" y2="263"/>
  </g>
  <!-- drawstrings -->
  <line x1="232" y1="356" x2="226" y2="430" stroke="#cfd8ee" stroke-width="6" stroke-linecap="round"/>
  <line x1="280" y1="356" x2="286" y2="430" stroke="#cfd8ee" stroke-width="6" stroke-linecap="round"/>
  <circle cx="226" cy="430" r="7" fill="#cfd8ee"/><circle cx="286" cy="430" r="7" fill="#cfd8ee"/>
