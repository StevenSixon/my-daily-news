<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241551"/>
      <stop offset="0.55" stop-color="#341a6b"/>
      <stop offset="1" stop-color="#160c30"/>
    </linearGradient>
    <radialGradient id="gd" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#8a2bff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8a2bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a5cff"/>
      <stop offset="1" stop-color="#6f12f5"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2b4a"/>
      <stop offset="1" stop-color="#10406b"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgd)"/>
  <rect width="512" height="512" rx="112" fill="url(#gd)"/>

  <!-- faint code motif -->
  <g fill="#7ff0ff" opacity="0.16" font-family="monospace" font-size="40" font-weight="700">
    <text x="44" y="92">&lt;/&gt;</text>
    <text x="392" y="470">{ }</text>
    <text x="404" y="120">*</text>
  </g>

  <!-- shoulders / hoodie -->
  <path d="M96 512 V452 a160 160 0 0 1 320 0 V512 Z" fill="url(#hoodie)"/>
  <!-- hood collar -->
  <path d="M168 470 q88 -70 176 0 q-88 -34 -176 0 Z" fill="#5a0fd6" opacity="0.8"/>
  <!-- zipper -->
  <line x1="256" y1="452" x2="256" y2="512" stroke="#4a0bb0" stroke-width="6"/>

  <!-- neck -->
  <rect x="226" y="338" width="60" height="70" rx="26" fill="#e8b48c"/>
  <rect x="226" y="338" width="60" height="40" rx="20" fill="#cf9a72" opacity="0.5"/>

  <!-- ears -->
  <circle cx="158" cy="252" r="22" fill="#e8b48c"/>
  <circle cx="354" cy="252" r="22" fill="#e8b48c"/>

  <!-- head -->
  <ellipse cx="256" cy="236" rx="100" ry="110" fill="#f3c9a6"/>
  <!-- cheek shade -->
  <ellipse cx="256" cy="262" rx="100" ry="86" fill="#e8b48c" opacity="0.35"/>

  <!-- hair -->
  <path d="M156 232 q-6 -110 100 -118 q106 8 100 118 q-30 -56 -100 -52 q-70 -4 -100 52 Z" fill="#2c2348"/>
  <path d="M156 232 q-6 -110 100 -118 q40 2 64 22 q-58 -10 -98 26 q-40 18 -66 70 Z" fill="#3a2f5e"/>

  <!-- glasses -->
  <g>
    <rect x="178" y="214" width="74" height="58" rx="20" fill="url(#lens)" stroke="#15101f" stroke-width="7"/>
    <rect x="260" y="214" width="74" height="58" rx="20" fill="url(#lens)" stroke="#15101f" stroke-width="7"/>
    <line x1="252" y1="232" x2="260" y2="232" stroke="#15101f" stroke-width="7"/>
    <!-- code glint on lenses -->
    <g stroke="#7ff0ff" stroke-width="4" opacity="0.85" stroke-linecap="round">
      <line x1="192" y1="232" x2="210" y2="232"/>
      <line x1="192" y1="246" x2="224" y2="246"/>
      <line x1="192" y1="260" x2="206" y2="260"/>
      <line x1="274" y1="232" x2="300" y2="232"/>
      <line x1="274" y1="246" x2="288" y2="246"/>
      <line x1="274" y1="260" x2="312" y2="260"/>
    </g>
  </g>

  <!-- eyebrows -->
  <g stroke="#2c2348" stroke-width="8" stroke-linecap="round">
    <line x1="190" y1="202" x2="240" y2="200"/>
    <line x1="272" y1="200" x2="322" y2="202"/>
  </g>

  <!-- smile -->
  <path d="M222 300 q34 30 68 0" fill="none" stroke="#b9745a" stroke-width="8" stroke-linecap="round"/>

  <!-- headset band -->
  <path d="M150 244 q-2 -120 106 -120 q108 0 106 120" fill="none" stroke="#1d2740" stroke-width="14" stroke-linecap="round"/>
  <!-- ear cups -->
  <rect x="128" y="226" width="46" height="62" rx="20" fill="#243152"/>
  <rect x="138" y="236" width="26" height="42" rx="13" fill="#47bfff" opacity="0.85"/>
  <rect x="338" y="226" width="46" height="62" rx="20" fill="#243152"/>
  <rect x="348" y="236" width="26" height="42" rx="13" fill="#47bfff" opacity="0.85"/>
  <!-- mic boom -->
  <path d="M150 286 q-18 40 80 56" fill="none" stroke="#1d2740" stroke-width="9" stroke-linecap="round"/>
  <circle cx="232" cy="344" r="11" fill="#47bfff"/>
</svg>
