# ===== AI 项目日报助理 配置 =====
# 密钥/base_url 不放这里，统一在 .env

# 关注范围（未来扩展只改这里）
focus:
  categories: ["AI 应用"]                 # 后续可加 "Agent框架" "RAG" "多模态"
  search_topics: [ai, llm, agent, rag, llm-agent, ai-agent, generative-ai, chatbot]
  min_stars: 200
  created_within_days: 30
  pushed_within_days: 14
  blocklist:                              # 误判过/明确不要的项目，永不收录（owner/repo）
    - iptv-org/iptv

# 采集
collect:
  sources: [trending, search]           # 双源
  trending_since: [daily, weekly]
  per_topic_limit: 20                    # 每个 topic 搜索取前 N
  top_n: 5                               # 每天最多深度学习的项目数

# 学习
analyze:
  depth: medium                          # README + docs + release
  max_readme_chars: 12000

# 复访迭代：老项目何时重新调 LLM 重学
analyze_revisit:
  on_new_release: true                   # 出新 release 则重学
  on_star_jump_pct: 30                   # star 较上次增长 >= 30% 则重学
  else_lightweight: true                 # 否则只更新 metadata + history，不调 LLM

# 多模型可插拔：换模型只改这里（密钥/base_url 在 .env）
llm:
  provider: deepseek                    # anthropic | openai | gemini | deepseek | openai_compatible | ollama
  model: deepseek-v4-pro
  temperature: 0.3
  max_tokens: 4000
  fallback:                              # 主模型失败时按序降级（可留空 [])
    - { provider: deepseek, model: deepseek-chat }

# 报告与目录
report:
  projects_dir: projects                 # 项目库（与日期无关，持续迭代）
  daily_dir: daily                       # 日报（按天）
  trends_dir: trends                     # 周趋势报告（二次报告）
  timezone: Asia/Shanghai
  streak_min_days: 3                      # 「连续霸榜」榜单的最小连续上榜天数（含当天）

# 周趋势报告（python -m src.trend）
trend:
  window_days: 7                         # 统计窗口
  top_n: 8                               # 各榜单展示条数

# AI 资讯（与项目榜并行的独立轨：RSS 官方博客/论文/HF + Hacker News API）
# 全部为公开 RSS / 公共 API，无需任何密钥。失效源会被安全跳过。
news:
  enabled: true
  window_days: 3          # 只收近 N 天发布的资讯，避免首跑回灌历史
  max_items: 12           # 每天进日报的资讯条数（控 LLM 成本）
  llm_summarize: true     # true=调 LLM 出中文一句话摘要+分类；false=仅标题聚合（零成本）
  hn_min_points: 80       # Hacker News 点赞门槛（过滤低热度）
  sources:
    official:             # 一手公司博客（权重最高）
      - { name: OpenAI,           url: "https://openai.com/news/rss.xml" }
      - { name: Google DeepMind,  url: "https://deepmind.google/blog/rss.xml" }
      - { name: Google AI,        url: "https://blog.google/technology/ai/rss/" }
      # 以下暂无公开 RSS（站点为 JS 渲染），待官方提供后再启用：
      # - { name: Anthropic, url: "" }
      # - { name: Meta AI,   url: "" }
    paper:               # 论文前沿
      - { name: "arXiv cs.AI", url: "http://export.arxiv.org/rss/cs.AI" }
      - { name: "arXiv cs.CL", url: "http://export.arxiv.org/rss/cs.CL" }
      - { name: "arXiv cs.LG", url: "http://export.arxiv.org/rss/cs.LG" }
    hf:                  # Hugging Face 官方博客
      - { name: "HF Blog", url: "https://huggingface.co/blog/feed.xml" }
  # Hacker News（社区热度，AI 关键词过滤）默认开启；置 false 关闭：
  hacker_news: true

# 飞书（接收者/密钥在 .env）
feishu:
  card_top_n: 5
  header_template: blue
