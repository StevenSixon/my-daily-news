name: Daily pipeline

# Self-hosting via GitHub Actions instead of a local Mac + launchd.
# Runs the collect → analyze → daily-report pipeline on a schedule, commits the
# generated files back to the repo, and (optionally) pushes the digest.
#
# Setup (one time):
#   1. Repo Settings → Secrets and variables → Actions → add the secrets below.
#   2. Repo Settings → Actions → General → Workflow permissions → "Read and write".
#   3. (Optional) Settings → Pages → Source = "GitHub Actions" so the dashboard
#      redeploys when its data changes.
#
# Required secrets:  GH_PAT (a PAT with public read; the built-in GITHUB_TOKEN
#   also works for the API but a PAT avoids low rate limits) and the LLM key for
#   your configured provider, e.g. ANTHROPIC_API_KEY / DEEPSEEK_API_KEY.
# Optional secrets (only if you want Feishu push): FEISHU_APP_ID,
#   FEISHU_APP_SECRET, FEISHU_RECEIVE_ID, FEISHU_RECEIVE_ID_TYPE.

on:
  schedule:
    # 目标：飞书日报每天早上 8 点（北京时间）到货。
    # GitHub 的 schedule 是「尽力而为」：高负载时会延迟甚至静默丢弃。单个 cron
    # 不可靠，故排 3 个错开时刻做冗余；下面的 guard 步骤保证当天只真正跑一次
    # （已生成则跳过），不会重复推送。GitHub cron 一律按 UTC；北京 = UTC + 8。
    - cron: "37 23 * * *"   # 北京 07:37（主）
    - cron: "13 0 * * *"    # 北京 08:13（补跑1）
    - cron: "47 0 * * *"    # 北京 08:47（补跑2）
  workflow_dispatch: # lets you trigger a run manually from the Actions tab

# Don't let two scheduled runs overlap and fight over the commit.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the generated daily/ + projects/ back
    env:
      # Mapped to job env so the optional push step can gate on them in `if:`
      # (the `secrets` context is not available inside `if` conditions).
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
      FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — 当天已生成则跳过（防多 cron 重复推送；手动触发不受限）
        id: guard
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "手动/其他事件触发（${{ github.event_name }}）：照常运行。"
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -f "daily/${TODAY}.json" ]; then
            echo "今日（${TODAY}）日报已存在，跳过本次定时运行。"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "今日（${TODAY}）尚无日报，继续。"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (collect + analyze + daily report)
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          # Provide whichever LLM key matches config/config.yaml's provider.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m src.pipeline

      - name: Refresh dashboard data
        if: steps.guard.outputs.run == 'true'
        # Regenerates dashboard/src/daily.json from the pipeline output. Rebuilding
        # the single-file bundle.html needs the local artifacts-builder toolchain,
        # so that step is intentionally skipped here (commit the bundle locally, or
        # extend this job with your own build).
        run: node dashboard/scripts/gen-data.mjs || echo "dashboard data refresh skipped"

      - name: Commit generated output
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ projects/ data/ dashboard/src/daily.json
          if git diff --cached --quiet; then
            echo "No new output to commit."
            exit 0
          fi
          git commit -m "data: daily pipeline output ($(date -u +%Y-%m-%d))"
          # Retry with rebase: the long pipeline run leaves a wide window for
          # another push (local machine / a second run) to advance main, which
          # would make a bare push fail with a non-fast-forward rejection.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest main…"
            git pull --rebase --autostash origin main
          done
          echo "::error::Failed to push pipeline output after 3 attempts."
          exit 1

      - name: Push digest to Feishu (optional)
        # 仅当本次真正跑了（guard 通过）且配置了飞书密钥时推送。
        if: ${{ steps.guard.outputs.run == 'true' && env.FEISHU_APP_ID != '' }}
        run: python -m src.push
