name: Deploy dashboard to Pages

# Publishes dashboard/bundle.html as the GitHub Pages site (served as index.html).
# The bundle is committed by the pipeline's refresh step, so no build runs here.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - dashboard/bundle.html
      - .github/workflows/deploy-dashboard.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp dashboard/bundle.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
